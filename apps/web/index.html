<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tile Fighter</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23145a8d'/%3E%3Cpath d='M7 7h8v8H7zM17 7h8v8h-8zM7 17h8v8H7zM17 17h8v8h-8z' fill='%23f0f4f8'/%3E%3C/svg%3E" />
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top, #f5fbff 0%, #e7f2ff 40%, #d8e8ff 100%);
        color: #102a43;
      }

      .shell {
        max-width: 1040px;
        margin: 0 auto;
        padding: 24px;
      }

      .title {
        margin: 0 0 8px;
        font-size: 2rem;
      }

      .subtitle {
        margin: 0 0 20px;
        color: #334e68;
      }

      .panel {
        background: #ffffffcc;
        border: 1px solid #bcccdc;
        border-radius: 14px;
        padding: 16px;
        margin-bottom: 16px;
        box-shadow: 0 8px 16px rgb(16 42 67 / 8%);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 12px;
      }

      button {
        border: 0;
        border-radius: 999px;
        background: #0f609b;
        color: white;
        padding: 10px 14px;
        cursor: pointer;
        font-size: 0.95rem;
      }

      button:disabled {
        background: #9fb3c8;
        cursor: not-allowed;
      }

      .world-grid {
        display: grid;
        grid-template-columns: repeat(20, minmax(0, 1fr));
        gap: 2px;
        background: #486581;
        border-radius: 10px;
        padding: 2px;
      }

      .cell {
        aspect-ratio: 1 / 1;
        border: 0;
        background: #f0f4f8;
      }

      .cell[data-occupied="true"] {
        box-shadow: inset 0 0 0 1px #243b53;
      }

      .status {
        font-size: 0.95rem;
        margin-bottom: 10px;
      }

      .log {
        margin: 0;
        padding-left: 18px;
        max-height: 180px;
        overflow-y: auto;
      }

      .log li {
        margin-bottom: 6px;
        font-size: 0.9rem;
      }

      @media (max-width: 700px) {
        .shell {
          padding: 12px;
        }

        .world-grid {
          grid-template-columns: repeat(10, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <h1 class="title">Tile Fighter</h1>
      <p class="subtitle">Local browser shell for E1-S1 product-visible validation</p>

      <section class="panel" aria-label="Session controls">
        <div class="actions">
          <button id="btn-start">Start Session</button>
          <button id="btn-join" disabled>Join Arena</button>
          <button id="btn-sync" disabled>Sync Viewport</button>
        </div>
        <div id="status" class="status">Status: idle</div>
      </section>

      <section class="panel" aria-label="World canvas">
        <div id="grid" class="world-grid"></div>
      </section>

      <section class="panel" aria-label="Activity log">
        <h2>Activity Log</h2>
        <ul id="log" class="log"></ul>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
