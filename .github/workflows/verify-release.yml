name: Verify Release

on:
  workflow_run:
    workflows:
      - Release Dev
      - Release Prod
    types:
      - completed
  workflow_dispatch:
    inputs:
      deployment_environment:
        description: Target environment for verification
        required: true
        type: choice
        options:
          - dev
          - prod
      app_url:
        description: Optional override for the deployed app base URL
        required: false
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify deployment probes and smoke checks
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.deployment_environment || (github.event.workflow_run.name == 'Release Prod' && 'prod' || 'dev') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve verification endpoints
        env:
          APP_URL_INPUT: ${{ inputs.app_url }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          VERIFY_BEARER_TOKEN: ${{ secrets.VERIFY_BEARER_TOKEN }}
          VERIFY_TOKEN_EXPECTED_ISSUER: ${{ secrets.VERIFY_TOKEN_EXPECTED_ISSUER }}
          VERIFY_TOKEN_EXPECTED_AUDIENCE: ${{ secrets.VERIFY_TOKEN_EXPECTED_AUDIENCE }}
          VERIFY_TOKEN_EXPECTED_VERSION: ${{ secrets.VERIFY_TOKEN_EXPECTED_VERSION }}
          VERIFY_TOKEN_EXPECTED_TENANT_ID: ${{ secrets.VERIFY_TOKEN_EXPECTED_TENANT_ID }}
          VERIFY_TOKEN_PROVENANCE: ${{ secrets.VERIFY_TOKEN_PROVENANCE }}
          TELEMETRY_SINK_MODE: ${{ secrets.TELEMETRY_SINK_MODE }}
          TELEMETRY_SINK_URL: ${{ secrets.TELEMETRY_SINK_URL }}
          TELEMETRY_SINK_NAME: ${{ secrets.TELEMETRY_SINK_NAME }}
        run: |
          set -euo pipefail

          APP_URL="${APP_URL_INPUT:-}"
          if [[ -z "$APP_URL" ]]; then
            APP_URL="${APP_BASE_URL:-}"
          fi

          if [[ -z "$APP_URL" ]]; then
            echo "Missing required app URL. Set workflow input app_url or APP_BASE_URL environment secret." >&2
            exit 1
          fi

          if [[ -z "${VERIFY_BEARER_TOKEN:-}" ]]; then
            echo "Missing required secret: VERIFY_BEARER_TOKEN" >&2
            exit 1
          fi

          if [[ -z "${VERIFY_TOKEN_EXPECTED_ISSUER:-}" || -z "${VERIFY_TOKEN_EXPECTED_AUDIENCE:-}" || -z "${VERIFY_TOKEN_EXPECTED_VERSION:-}" || -z "${VERIFY_TOKEN_EXPECTED_TENANT_ID:-}" ]]; then
            echo "Missing required expected-claim secret(s) for verification token validation." >&2
            exit 1
          fi

          if [[ -z "${VERIFY_TOKEN_PROVENANCE:-}" ]]; then
            echo "Missing required secret: VERIFY_TOKEN_PROVENANCE" >&2
            exit 1
          fi

          TELEMETRY_MODE="${TELEMETRY_SINK_MODE:-optional}"
          if [[ "$TELEMETRY_MODE" == "required" && -z "${TELEMETRY_SINK_URL:-}" ]]; then
            echo "TELEMETRY_SINK_URL is required when TELEMETRY_SINK_MODE=required" >&2
            exit 1
          fi

          APP_URL="${APP_URL%/}"
          WS_URL="${APP_URL/https:\/\//wss://}"
          WS_URL="${WS_URL/http:\/\//ws://}"

          echo "APP_URL=$APP_URL" >> "$GITHUB_ENV"
          echo "WS_URL=$WS_URL" >> "$GITHUB_ENV"
          echo "TELEMETRY_SINK_MODE=$TELEMETRY_MODE" >> "$GITHUB_ENV"
          echo "TELEMETRY_SINK_URL=${TELEMETRY_SINK_URL:-}" >> "$GITHUB_ENV"
          echo "TELEMETRY_SINK_NAME=${TELEMETRY_SINK_NAME:-verify-release}" >> "$GITHUB_ENV"

      - name: Validate verification token provenance and expected claims
        env:
          VERIFY_BEARER_TOKEN: ${{ secrets.VERIFY_BEARER_TOKEN }}
          VERIFY_TOKEN_EXPECTED_ISSUER: ${{ secrets.VERIFY_TOKEN_EXPECTED_ISSUER }}
          VERIFY_TOKEN_EXPECTED_AUDIENCE: ${{ secrets.VERIFY_TOKEN_EXPECTED_AUDIENCE }}
          VERIFY_TOKEN_EXPECTED_VERSION: ${{ secrets.VERIFY_TOKEN_EXPECTED_VERSION }}
          VERIFY_TOKEN_EXPECTED_TENANT_ID: ${{ secrets.VERIFY_TOKEN_EXPECTED_TENANT_ID }}
          VERIFY_TOKEN_PROVENANCE: ${{ secrets.VERIFY_TOKEN_PROVENANCE }}
        run: |
          set -euo pipefail

          node - <<'NODE'
          const token = process.env.VERIFY_BEARER_TOKEN;
          const expectedIssuer = process.env.VERIFY_TOKEN_EXPECTED_ISSUER;
          const expectedAudience = process.env.VERIFY_TOKEN_EXPECTED_AUDIENCE;
          const expectedVersion = process.env.VERIFY_TOKEN_EXPECTED_VERSION;
          const expectedTenantId = process.env.VERIFY_TOKEN_EXPECTED_TENANT_ID;
          const provenance = process.env.VERIFY_TOKEN_PROVENANCE;

          if (!token || !expectedIssuer || !expectedAudience || !expectedVersion || !expectedTenantId || !provenance) {
            throw new Error("Missing verification token validation inputs");
          }

          const parts = token.split(".");
          if (parts.length < 2) {
            throw new Error("Verification token is malformed");
          }

          const payload = JSON.parse(Buffer.from(parts[1], "base64url").toString("utf8"));
          const audience = Array.isArray(payload.aud) ? payload.aud : [payload.aud];

          if (payload.iss !== expectedIssuer) {
            throw new Error(`Verification token issuer mismatch: expected ${expectedIssuer}, got ${payload.iss}`);
          }

          if (!audience.includes(expectedAudience)) {
            throw new Error(`Verification token audience mismatch: expected ${expectedAudience}, got ${audience.join(",")}`);
          }

          if (payload.ver !== expectedVersion) {
            throw new Error(`Verification token version mismatch: expected ${expectedVersion}, got ${payload.ver}`);
          }

          if (payload.tid !== expectedTenantId) {
            throw new Error(`Verification token tenant mismatch: expected ${expectedTenantId}, got ${payload.tid}`);
          }

          process.stdout.write(`Verification token provenance: ${provenance}\n`);
          NODE

      - name: Verify liveness probe
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "$APP_URL/healthz" > /dev/null

      - name: Verify readiness probe
        run: |
          set -euo pipefail
          curl --fail --silent --show-error "$APP_URL/readyz" > /dev/null

      - name: Verify authenticated HTTP smoke route
        env:
          VERIFY_BEARER_TOKEN: ${{ secrets.VERIFY_BEARER_TOKEN }}
        run: |
          set -euo pipefail
          RESPONSE="$(curl --fail --silent --show-error \
            -H "Authorization: Bearer ${VERIFY_BEARER_TOKEN}" \
            "$APP_URL/api/protected/profile")"
          if [[ "$RESPONSE" != *'"subject"'* ]]; then
            echo "Authenticated smoke route returned unexpected response payload." >&2
            exit 1
          fi

      - name: Verify authenticated bootstrap route
        env:
          VERIFY_BEARER_TOKEN: ${{ secrets.VERIFY_BEARER_TOKEN }}
        run: |
          set -euo pipefail
          RESPONSE="$(curl --fail --silent --show-error \
            -H "Authorization: Bearer ${VERIFY_BEARER_TOKEN}" \
            "$APP_URL/api/session/bootstrap")"
          if [[ "$RESPONSE" != *'"bootstrapState":"token-ready"'* ]]; then
            echo "Bootstrap route returned unexpected bootstrap state." >&2
            exit 1
          fi

      - name: Verify authenticated room join smoke
        env:
          LOAD_ENDPOINT: ${{ env.WS_URL }}
          LOAD_BEARER_TOKEN: ${{ secrets.VERIFY_BEARER_TOKEN }}
          LOAD_JOIN_COUNT: 5
          LOAD_ROOM_KEY: arena
          LOAD_EVIDENCE_PATH: artifacts/verify-room-join-metrics.json
        run: npm run -w @game/server test:load

      - name: Verify room join metrics and playable-shell p50 budget
        run: |
          set -euo pipefail

          node - <<'NODE'
          const fs = require("node:fs");

          const evidencePath = "artifacts/verify-room-join-metrics.json";
          if (!fs.existsSync(evidencePath)) {
            throw new Error(`Missing expected evidence artifact: ${evidencePath}`);
          }

          const evidence = JSON.parse(fs.readFileSync(evidencePath, "utf8"));
          if (typeof evidence.p50Ms !== "number") {
            throw new Error("Evidence artifact missing numeric p50Ms");
          }
          if (evidence.p50Ms > 5000) {
            throw new Error(`Playable-shell p50 regression: expected <= 5000ms, got ${evidence.p50Ms}ms`);
          }

          process.stdout.write(`Verified playable-shell p50 budget: ${evidence.p50Ms}ms\n`);
          NODE

      - name: Assert Colyseus remains room-membership authority
        run: |
          set -euo pipefail

          ROOM_HOOK_COUNT="$(grep -E "onJoin|onLeave" -c apps/server/src/rooms/arena.room.ts || true)"
          ROOM_LIFECYCLE_CALL_COUNT="$(grep -E "noteRoomJoin|noteRoomLeave" -c apps/server/src/rooms/arena.room.ts || true)"
          SESSION_ROUTE_MEMBERSHIP_CALL_COUNT="$(grep -E "noteRoomJoin|noteRoomLeave" -c apps/server/src/http/routes/session.routes.ts || true)"

          if [[ "$ROOM_HOOK_COUNT" -lt 2 ]]; then
            echo "Expected Colyseus room lifecycle hooks in arena room implementation." >&2
            exit 1
          fi

          if [[ "$ROOM_LIFECYCLE_CALL_COUNT" -lt 2 ]]; then
            echo "Expected room membership transitions to be invoked from ArenaRoom hooks." >&2
            exit 1
          fi

          if [[ "$SESSION_ROUTE_MEMBERSHIP_CALL_COUNT" -gt 0 ]]; then
            echo "HTTP session routes should not own room membership transitions." >&2
            exit 1
          fi

      - name: Run E3-S4 sustained 50 CCU latency budget load
        env:
          LOAD_ENDPOINT: ${{ env.WS_URL }}
          LOAD_BEARER_TOKEN: ${{ secrets.VERIFY_BEARER_TOKEN }}
          LOAD_CCU: 50
          LOAD_DURATION_MINUTES: 30
          LOAD_ROOM_KEY: arena
          LOAD_EVIDENCE_PATH: artifacts/e3-s4-latency-budget.json
          LOAD_RUN_CLASS: release
        run: npx vitest run apps/server/tests/load/e3-s4-latency-budget.load.ts --reporter=verbose

      - name: Assert E3-S4 latency budget evidence
        run: |
          set -euo pipefail

          node - <<'NODE'
          const fs = require("node:fs");

          const evidencePath = "artifacts/e3-s4-latency-budget.json";
          if (!fs.existsSync(evidencePath)) {
            throw new Error(`Missing expected evidence artifact: ${evidencePath}`);
          }

          const evidence = JSON.parse(fs.readFileSync(evidencePath, "utf8"));

          if (typeof evidence.metrics?.placementAckMedianMs !== "number") {
            throw new Error("Evidence artifact missing numeric metrics.placementAckMedianMs");
          }
          if (typeof evidence.metrics?.reconnectP95Ms !== "number") {
            throw new Error("Evidence artifact missing numeric metrics.reconnectP95Ms");
          }

          const placementAck = evidence.metrics.placementAckMedianMs;
          const reconnectP95 = evidence.metrics.reconnectP95Ms;

          if (placementAck > 200) {
            throw new Error(`E3-S4 placement ack median regression: expected <= 200ms, got ${placementAck}ms`);
          }
          if (reconnectP95 > 3000) {
            throw new Error(`E3-S4 reconnect p95 regression: expected <= 3000ms, got ${reconnectP95}ms`);
          }

          process.stdout.write(
            `E3-S4 release budget passed: placement_ack_median=${placementAck}ms reconnect_p95=${reconnectP95}ms\n`
          );
          NODE

      - name: Upload verification evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: verify-release-evidence-${{ github.run_id }}
          path: artifacts/
