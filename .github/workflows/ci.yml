name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Lint, test, and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --workspaces --include-workspace-root

      - name: Dependency audit (high and above)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Verify integration DB precondition
        run: |
          if [ -z "$TEST_DATABASE_URL" ]; then
            echo "TEST_DATABASE_URL is required for DB-backed integration suites in CI"
            exit 1
          fi

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
