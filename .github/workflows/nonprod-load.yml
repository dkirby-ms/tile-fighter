name: Nonprod Load

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nonprod-load:
    name: Run non-production load check
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate non-production load inputs
        env:
          NONPROD_WS_ENDPOINT: ${{ secrets.NONPROD_WS_ENDPOINT }}
          NONPROD_LOAD_BEARER_TOKEN: ${{ secrets.NONPROD_LOAD_BEARER_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${NONPROD_WS_ENDPOINT:-}" ]]; then
            echo "Missing required secret: NONPROD_WS_ENDPOINT" >&2
            exit 1
          fi

          if [[ -z "${NONPROD_LOAD_BEARER_TOKEN:-}" ]]; then
            echo "Missing required secret: NONPROD_LOAD_BEARER_TOKEN" >&2
            exit 1
          fi

      - name: Execute non-production room join load test
        env:
          LOAD_ENDPOINT: ${{ secrets.NONPROD_WS_ENDPOINT }}
          LOAD_BEARER_TOKEN: ${{ secrets.NONPROD_LOAD_BEARER_TOKEN }}
          LOAD_JOIN_COUNT: 25
        run: npm run -w @game/server test:load
