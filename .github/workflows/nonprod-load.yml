name: Nonprod Load

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nonprod-load:
    name: Run non-production load check
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate non-production load inputs
        env:
          NONPROD_WS_ENDPOINT: ${{ secrets.NONPROD_WS_ENDPOINT }}
          NONPROD_LOAD_BEARER_TOKEN: ${{ secrets.NONPROD_LOAD_BEARER_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${NONPROD_WS_ENDPOINT:-}" ]]; then
            echo "Missing required secret: NONPROD_WS_ENDPOINT" >&2
            exit 1
          fi

          if [[ -z "${NONPROD_LOAD_BEARER_TOKEN:-}" ]]; then
            echo "Missing required secret: NONPROD_LOAD_BEARER_TOKEN" >&2
            exit 1
          fi

      - name: Execute non-production room join load test
        env:
          LOAD_ENDPOINT: ${{ secrets.NONPROD_WS_ENDPOINT }}
          LOAD_BEARER_TOKEN: ${{ secrets.NONPROD_LOAD_BEARER_TOKEN }}
          LOAD_JOIN_COUNT: 25
        run: npm run -w @game/server test:load

      - name: Execute E3-S4 sustained 50 CCU latency budget load
        env:
          LOAD_ENDPOINT: ${{ secrets.NONPROD_WS_ENDPOINT }}
          LOAD_BEARER_TOKEN: ${{ secrets.NONPROD_LOAD_BEARER_TOKEN }}
          LOAD_CCU: 50
          LOAD_DURATION_MINUTES: 30
          LOAD_ROOM_KEY: arena
          LOAD_EVIDENCE_PATH: artifacts/e3-s4-latency-budget.json
          LOAD_RUN_CLASS: nonprod
        run: npx vitest run apps/server/tests/load/e3-s4-latency-budget.load.ts --reporter=verbose

      - name: Assert E3-S4 latency budget evidence
        run: |
          set -euo pipefail

          node - <<'NODE'
          const fs = require("node:fs");

          const evidencePath = "artifacts/e3-s4-latency-budget.json";
          if (!fs.existsSync(evidencePath)) {
            throw new Error(`Missing expected evidence artifact: ${evidencePath}`);
          }

          const evidence = JSON.parse(fs.readFileSync(evidencePath, "utf8"));

          if (typeof evidence.metrics?.placementAckMedianMs !== "number") {
            throw new Error("Evidence artifact missing numeric metrics.placementAckMedianMs");
          }
          if (typeof evidence.metrics?.reconnectP95Ms !== "number") {
            throw new Error("Evidence artifact missing numeric metrics.reconnectP95Ms");
          }

          const placementAck = evidence.metrics.placementAckMedianMs;
          const reconnectP95 = evidence.metrics.reconnectP95Ms;

          if (placementAck > 200) {
            throw new Error(`E3-S4 placement ack median regression: expected <= 200ms, got ${placementAck}ms`);
          }
          if (reconnectP95 > 3000) {
            throw new Error(`E3-S4 reconnect p95 regression: expected <= 3000ms, got ${reconnectP95}ms`);
          }

          process.stdout.write(
            `E3-S4 nonprod budget passed: placement_ack_median=${placementAck}ms reconnect_p95=${reconnectP95}ms\n`
          );
          NODE

      - name: Upload nonprod load evidence artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nonprod-load-evidence-${{ github.run_id }}
          path: artifacts/
